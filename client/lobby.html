<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Sala de Juego</title>
    <meta name="description" content="Sala de juego multijugador en tiempo real. Ve quién está conectado.">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <h1 data-text="SALA DE JUEGO">SALA DE JUEGO</h1>

    <div class="status">
        🎮 Conectado como: <strong id="currentUser">---</strong>
    </div>

    <h2>👥 JUGADORES EN LÍNEA</h2>
    <ul id="playersList">
        <li>Cargando guerreros...</li>
    </ul>

    <button id="logoutBtn" class="logout-btn">🚪 CERRAR SESIÓN</button>

    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>

    <!-- Modal de Desconexión -->
    <div id="disconnectModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>⚠️ Conexión Perdida</h3>
            <p>Se ha perdido la conexión con el servidor.</p>
            <button id="modalOkBtn" class="modal-btn">Volver al Login</button>
        </div>
    </div>

    <script src="js/particles.js"></script>
    <script src="js/lobby.js"></script>
</body>
</html>
