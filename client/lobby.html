<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego - Arena Multijugador</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body class="lobby-page">
    <h1 data-text="SALA DE JUEGO">SALA DE JUEGO</h1>
    <div class="status">
        🎮 Conectado como: <strong id="currentUser">---</strong>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="controls">
        <button id="colorBtn" class="feature-btn">🎨 Cambiar Color</button>
        <button id="logoutBtn" class="logout-btn">🚪 CERRAR SESIÓN</button>
    </div>
    <div class="particles" id="particles"></div>

    <!-- Modal de desconexión -->
    <div id="disconnectModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Conexión Perdida</h3>
            <p>Se ha perdido la conexión con el servidor.</p>
            <button id="modalOkBtn" class="modal-btn">Volver al Login</button>
        </div>
    </div>

    <script src="js/particles.js"></script>
    <script type="module" src="js/lobby.js"></script>
</body>
</html>
